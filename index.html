<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자성향 분석 | Investment Profile Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814; --ink-2: #3d3a35; --ink-3: #7a776f; --ink-4: #b5b2a9;
  --paper: #faf8f4; --paper-2: #f2efe9; --paper-3: #e8e4db;
  --gold: #c4933f; --gold-light: #f0d99a; --gold-pale: #fdf5e0;
  --teal: #2a7c6f; --blue: #2b5ea7; --amber: #b86e1a; --red: #943030;
  --red-light: #fae8e8; --radius: 2px; --radius-lg: 4px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.page{max-width:720px;margin:0 auto;padding:3rem 2rem 5rem}
.site-header{border-bottom:1px solid var(--paper-3);padding-bottom:1.5rem;margin-bottom:2.5rem;display:flex;align-items:baseline;justify-content:space-between}
.site-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink)}
.site-logo span{color:var(--gold);font-style:italic}
.site-sub{font-size:11px;color:var(--ink-4);letter-spacing:.1em;text-transform:uppercase}
.progress-section{margin-bottom:2.5rem}
.progress-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem}
.progress-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
.progress-count{font-size:13px;color:var(--ink-3)}
.progress-track{height:2px;background:var(--paper-3);border-radius:1px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:1px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.section-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;font-weight:500}
.section-heading{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:500;color:var(--ink);margin-bottom:.5rem}
.section-desc{font-size:13px;color:var(--ink-3);line-height:1.7;margin-bottom:2rem;padding-left:.75rem;border-left:2px solid var(--paper-3)}
.q-meta{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem}
.q-number{font-size:11px;color:var(--ink-4);letter-spacing:.1em}
.q-weight{font-size:10px;background:var(--paper-2);border:1px solid var(--paper-3);border-radius:2px;padding:.15rem .45rem;color:var(--ink-3)}
.q-text{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:400;color:var(--ink);line-height:1.55;margin-bottom:1.5rem}
.scale-legend{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-4);letter-spacing:.06em;margin-bottom:.5rem;text-transform:uppercase}
.scale-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:2rem}
.scale-btn{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--radius);padding:.75rem .4rem .6rem;cursor:pointer;text-align:center;transition:all .18s ease;display:flex;flex-direction:column;align-items:center;gap:5px}
.scale-btn:hover{border-color:var(--gold);background:var(--gold-pale)}
.scale-btn.selected{background:var(--ink);border-color:var(--ink)}
.scale-btn .num{font-size:18px;font-family:'DM Serif Display',serif;color:var(--ink-3);line-height:1;transition:color .18s}
.scale-btn.selected .num{color:var(--gold)}
.scale-btn .hint{font-size:10px;color:var(--ink-4);line-height:1.35;transition:color .18s;word-break:keep-all}
.scale-btn.selected .hint{color:rgba(255,255,255,.6)}
.nav-row{display:flex;gap:10px;align-items:center}
.btn{padding:.65rem 1.5rem;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:400;transition:all .18s;letter-spacing:.02em}
.btn-outline{background:transparent;border:1px solid var(--paper-3);color:var(--ink-3)}
.btn-outline:hover{border-color:var(--ink-3);color:var(--ink)}
.btn-outline:disabled{opacity:.3;cursor:not-allowed}
.btn-primary{background:var(--ink);border:1px solid var(--ink);color:var(--gold-light);flex:1;text-align:center}
.btn-primary:hover{background:var(--ink-2)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--paper-3);color:var(--ink-3);width:100%;padding:.7rem;text-align:center;margin-top:.75rem}
.btn-ghost:hover{border-color:var(--ink-3);color:var(--ink)}
.result-top{border-bottom:1px solid var(--paper-3);padding-bottom:2rem;margin-bottom:2rem}
.result-type-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.result-name{font-family:'DM Serif Display',serif;font-size:36px;color:var(--ink);line-height:1.2;margin-bottom:.75rem}
.result-badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.result-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:11px;letter-spacing:.08em;padding:.3rem .8rem;border-radius:1px}
.badge-dark{background:var(--ink);color:var(--gold-light)}
.result-desc{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--ink-2);line-height:1.75}
.score-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:2rem}
.score-card{background:var(--paper-2);border:1px solid var(--paper-3);border-radius:var(--radius);padding:1rem;text-align:center}
.sc-label{font-size:10px;color:var(--ink-4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem}
.sc-value{font-family:'DM Serif Display',serif;font-size:28px;line-height:1;margin-bottom:.2rem}
.sc-grade{font-size:11px;font-weight:500;padding:.2rem .5rem;border-radius:2px;display:inline-block;margin-bottom:.2rem}
.sc-sub{font-size:10px;color:var(--ink-4)}
.gap-warning{background:var(--red-light);border:1px solid #f5c5c5;border-left:3px solid var(--red);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:1rem 1.15rem;margin-bottom:1.5rem}
.gap-warning .adv-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:.4rem}
.gap-warning .adv-text{font-size:13px;color:#5a1f1f;line-height:1.7}
.advisory{background:var(--gold-pale);border:1px solid #f0d99a;border-left:3px solid var(--gold);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:1rem 1.15rem;margin-bottom:1.5rem}
.adv-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:.4rem}
.adv-text{font-size:13px;color:var(--ink-2);line-height:1.7}
.dim-note{background:#e8f0fe;border:1px solid #c5d8f8;border-left:3px solid var(--blue);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:1rem 1.15rem;margin-bottom:1.5rem}
.dim-note .adv-label{color:var(--blue)}
.dim-note .adv-text{color:#1a3a6e}
.matrix-section{margin-bottom:2rem}
.block-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-4);margin-bottom:.9rem}
.matrix-axes{font-size:10px;color:var(--ink-4);margin-bottom:.5rem}
.matrix-scroll{overflow-x:auto}
.matrix-table{width:100%;border-collapse:collapse;font-size:11px;min-width:400px}
.matrix-table th{font-size:9px;font-weight:400;color:var(--ink-4);padding:.3rem .25rem .5rem;text-align:center;border-bottom:1px solid var(--paper-3)}
.row-header{font-size:9px;color:var(--ink-4);white-space:nowrap;padding-right:.4rem;text-align:right;vertical-align:middle;font-weight:400}
.m-cell{padding:.4rem .15rem;text-align:center;border:1px solid var(--paper-3);vertical-align:middle;cursor:default}
.m-cell .ck{font-size:9px;font-weight:500;margin-bottom:1px}
.m-cell .cn{font-size:8px;line-height:1.3}
.m-cell.active-cell{outline:2px solid var(--gold);outline-offset:1px}

/* ── 전략적/전술적 자산배분 섹션 ── */
.alloc-section{margin-bottom:2rem}
.alloc-strategy{background:var(--paper-2);border:1px solid var(--paper-3);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.alloc-strategy-header{padding:.75rem 1rem;border-bottom:1px solid var(--paper-3);display:flex;align-items:baseline;justify-content:space-between}
.alloc-strategy-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:500}
.alloc-strategy-note{font-size:10px;color:var(--ink-4)}
.alloc-body{padding:.85rem 1rem}
.alloc-big-row{display:flex;align-items:center;gap:12px;margin-bottom:.75rem}
.alloc-big-label{font-size:13px;color:var(--ink-2);width:70px;flex-shrink:0;font-weight:500}
.alloc-big-track{flex:1;height:14px;background:var(--paper-3);border-radius:1px;overflow:hidden;position:relative}
.alloc-big-fill{height:14px;border-radius:1px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.alloc-big-pct{font-size:14px;font-weight:500;color:var(--ink);width:36px;text-align:right}

.tactical-section{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:2rem}
.tactical-header{padding:.75rem 1rem;border-bottom:1px solid var(--paper-3);display:flex;align-items:baseline;justify-content:space-between}
.tactical-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:500}
.tactical-body{padding:.85rem 1rem}
.tactical-row{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.tactical-row:last-child{margin-bottom:0}
.tactical-label{font-size:12px;color:var(--ink-2);width:70px;flex-shrink:0}
.tactical-bar-wrap{flex:1;position:relative;height:28px;display:flex;align-items:center}
.tactical-center-line{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--paper-3)}
.tactical-base-mark{position:absolute;left:50%;top:4px;bottom:4px;width:3px;background:var(--ink-4);border-radius:1px;transform:translateX(-50%)}
.tactical-range-bar{position:absolute;height:10px;top:9px;border-radius:1px}
.tactical-plus-bar{left:50%;background:var(--teal);opacity:.55}
.tactical-minus-bar{right:50%;background:var(--red);opacity:.45}
.tactical-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-4);margin-top:2px}
.tactical-nums{font-size:11px;color:var(--ink-3);white-space:nowrap}
.tactical-legend{display:flex;gap:12px;margin-top:.85rem;padding-top:.65rem;border-top:1px solid var(--paper-3)}
.t-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink-4)}
.t-leg-dot{width:10px;height:10px;border-radius:1px}
.alloc-tactical-wrap{margin-bottom:2rem}
.alloc-tactical-wrap .alloc-section{margin-bottom:0}
.alloc-tactical-wrap .tactical-section{margin-bottom:0}
.tactical-outer{display:flex;flex-direction:column}

.checklist{list-style:none;margin-bottom:2rem}
.checklist li{display:flex;align-items:flex-start;gap:.7rem;font-size:13px;color:var(--ink-2);line-height:1.65;padding:.55rem 0;border-bottom:1px solid var(--paper-3)}
.checklist li:last-child{border-bottom:none}
.check-icon{width:16px;height:16px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.check-icon::after{content:'';width:6px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.re-section{margin-bottom:2rem}
.re-intro{font-size:13px;color:var(--ink-3);line-height:1.7;margin-bottom:1rem;padding:.75rem 1rem;background:var(--paper-2);border-radius:var(--radius);border:1px solid var(--paper-3)}
.re-intro strong{color:var(--ink-2);font-weight:500}
.re-tabs{display:flex;gap:6px;margin-bottom:1rem}
.re-tab{flex:1;padding:.5rem .4rem;border:1px solid var(--paper-3);border-radius:var(--radius);background:var(--paper);cursor:pointer;text-align:center;font-size:11px;color:var(--ink-3);transition:all .18s;line-height:1.35}
.re-tab:hover{border-color:var(--gold);color:var(--ink)}
.re-tab.active{background:var(--ink);border-color:var(--ink);color:var(--gold-light)}
.re-tab .re-tab-label{display:block;font-weight:500;margin-bottom:1px}
.re-tab .re-tab-range{display:block;font-size:10px;opacity:.75}
.re-panel{display:none}
.re-panel.active{display:block}
.re-card{border:1px solid var(--paper-3);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:.75rem}
.re-card-head{padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem}
.re-card-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.re-card-title{font-size:13px;font-weight:500;color:var(--ink)}
.re-card-sub{font-size:11px;color:var(--ink-3)}
.re-card-body{padding:.75rem 1rem;border-top:1px solid var(--paper-3)}
.re-card-body p{font-size:13px;color:var(--ink-2);line-height:1.65;margin-bottom:.5rem}
.re-card-body p:last-child{margin-bottom:0}
.re-highlight{background:var(--gold-pale);border-left:2px solid var(--gold);padding:.5rem .75rem;border-radius:0 var(--radius) var(--radius) 0;font-size:12px;color:var(--amber);margin-top:.5rem;line-height:1.55}
.re-link{display:inline-block;margin-top:.4rem;font-size:11px;color:var(--blue);text-decoration:none;border-bottom:1px solid transparent}
.re-link:hover{border-color:var(--blue)}
.re-source{font-size:10px;color:var(--ink-4);margin-top:1rem;padding-top:.75rem;border-top:1px solid var(--paper-3);line-height:1.6}
.result-footer{border-top:1px solid var(--paper-3);padding-top:1.5rem;margin-top:2rem;font-size:11px;color:var(--ink-4);line-height:1.7;text-align:center}
.section-div{border:none;border-top:1px solid var(--paper-3);margin:1.75rem 0}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both}
.fade-up-2{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) .1s both}
.fade-up-3{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) .2s both}
@media(max-width:540px){
  .page{padding:1.25rem 1rem 4rem}
  .result-name{font-size:26px}
  .sc-value{font-size:22px}
  .score-row{grid-template-columns:1fr 1fr 1fr;gap:6px}
  .sc-label{font-size:9px}
  .scale-grid{grid-template-columns:1fr;gap:7px}
  .scale-btn{flex-direction:row;align-items:center;padding:.65rem .85rem;text-align:left;gap:.75rem}
  .scale-btn .num{font-size:20px;width:28px;flex-shrink:0;text-align:center}
  .scale-btn .hint{display:block;font-size:12px;color:var(--ink-3);line-height:1.4;flex:1}
  .scale-btn.selected .hint{color:rgba(255,255,255,.8)}
  .scale-legend{display:none}
  .re-tabs{flex-direction:column;gap:6px}
  .re-tab{flex:none;display:flex;justify-content:space-between;align-items:center;padding:.6rem .85rem}
  .re-tab .re-tab-label{display:inline;margin-bottom:0}
  .re-tab .re-tab-range{display:inline;opacity:.6;margin-left:.5rem}
  .site-header{margin-bottom:2rem}
  .section-heading{font-size:17px}
  .q-text{font-size:15px}
}

/* ── 결과 탭 ── */
.result-tab-wrap{}
.result-tabs{display:flex;gap:8px;margin-bottom:2rem}
.result-tab{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:.65rem .75rem;border-radius:var(--radius);cursor:pointer;
  font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:400;
  border:1px solid var(--paper-3);background:var(--paper);
  color:var(--ink-3);transition:all .2s;letter-spacing:.02em;
}
.result-tab:hover{border-color:var(--gold);color:var(--ink)}
.result-tab.active{background:var(--ink);border-color:var(--ink);color:var(--gold-light);font-weight:500}
.rtab-icon{font-size:14px}
.result-panel{display:none}
.result-panel.active{display:block}
.preview-intro{
  font-size:13px;color:var(--ink-3);line-height:1.75;
  padding:.75rem 1rem;background:var(--paper-2);
  border-radius:var(--radius);border:1px solid var(--paper-3);
  margin-bottom:1.5rem;
}
.preview-intro strong{color:var(--ink);font-weight:500}
.preview-cta{width:100%;padding:.85rem;font-size:14px;margin-top:1.5rem}

/* ── 인포그래픽 (크림/골드 무드) ── */
.ig-wrap{
  border:1px solid var(--paper-3);border-radius:var(--radius-lg);
  overflow:hidden;background:var(--paper);margin-bottom:1rem;
}
.ig-hero{
  background:var(--ink);padding:2rem 2rem 1.5rem;text-align:center;
}
.ig-sub{
  font-size:10px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;
  font-weight:500;margin-bottom:.5rem;
}
.ig-title{
  font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1.35;
}
.ig-title span{color:var(--gold-light);font-style:italic}
.ig-note{
  margin-top:.85rem;font-size:11.5px;color:rgba(255,255,255,.48);line-height:1.65;
  border-top:1px solid rgba(255,255,255,.12);padding-top:.85rem;
}
.ig-stages{display:flex;gap:0;border-bottom:1px solid var(--paper-3)}
.ig-stage{
  flex:1;padding:1.25rem 1rem;border-right:1px solid var(--paper-3);
  background:var(--paper);
}
.ig-stage:last-child{border-right:none}
.ig-badge{
  display:inline-block;background:var(--ink);color:var(--gold-light);
  font-size:9.5px;font-weight:500;border-radius:1px;padding:2px 9px;
  letter-spacing:.08em;margin-bottom:.6rem;
}
.ig-stage-name{
  font-family:'Noto Serif KR',serif;font-size:14px;font-weight:500;
  color:var(--ink);margin-bottom:2px;
}
.ig-stage-sub{font-size:10px;color:var(--ink-4);margin-bottom:.75rem}
.ig-icon{font-size:22px;margin:0 0 .65rem}
.ig-bullets{list-style:none;padding:0;margin-bottom:0}
.ig-bullets li{
  font-size:10.5px;color:var(--ink-2);padding:2.5px 0 2.5px 13px;
  position:relative;line-height:1.45;
}
.ig-bullets li::before{
  content:'✓';position:absolute;left:0;color:var(--teal);font-size:9.5px;font-weight:500;
}
.ig-goal{
  margin-top:.85rem;background:var(--gold-pale);border:1px solid var(--gold-light);
  border-radius:var(--radius);padding:6px 8px;font-size:10px;
  color:var(--amber);text-align:center;font-weight:500;line-height:1.4;
}
.ig-mid{padding:1.5rem 1.5rem 0}
.ig-result-title{
  font-family:'Noto Serif KR',serif;font-size:14px;font-weight:500;
  color:var(--ink);margin-bottom:1.25rem;text-align:center;
}
.ig-result-title span{color:var(--gold)}
.ig-compare{display:flex;gap:12px;margin-bottom:1.25rem}
.ig-case{
  flex:1;border:1px solid var(--paper-3);border-radius:var(--radius-lg);
  overflow:hidden;background:var(--paper-2);
}
.ig-case-header{
  padding:.6rem .85rem;background:var(--paper-3);
  font-size:10px;color:var(--ink-3);font-weight:500;letter-spacing:.04em;
}
.ig-case-body{padding:.85rem}
.ig-case-loss{font-size:12px;font-weight:500;margin-bottom:.75rem}
.ig-case-loss.ok{color:var(--teal)}
.ig-case-loss.bad{color:var(--red)}
.ig-chart-wrap{
  background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--radius);
  padding:8px 8px 5px;margin-bottom:.75rem;
}
.ig-metrics{display:flex;gap:6px;margin-bottom:.75rem}
.ig-metric{
  flex:1;text-align:center;background:var(--paper);
  border:1px solid var(--paper-3);border-radius:var(--radius);padding:6px 3px;
}
.ig-mi{font-size:13px;margin-bottom:2px}
.ig-ml{font-size:9px;color:var(--ink-4);line-height:1.3}
.ig-mv{font-size:9.5px;font-weight:500;margin-top:2px;line-height:1.3}
.ig-mv.ok{color:var(--teal)}
.ig-mv.bad{color:var(--red)}
.ig-case-result{
  text-align:center;font-size:10.5px;font-weight:500;
  border-radius:var(--radius);padding:6px;
}
.ig-case-result.ok{background:#e8f5e9;color:#1b5e20;border:1px solid #c8e6c9}
.ig-case-result.bad{background:var(--red-light);color:#7f1414;border:1px solid #f5c5c5}
.ig-footer{
  padding:1rem 1.5rem;background:var(--paper-2);
  border-top:1px solid var(--paper-3);
}
.ig-rel-note{

function calcScore(answers,questions){
  let total=0,maxTotal=0;
  questions.forEach((q,i)=>{
    const ans=answers[i]||0;
    total+=((ans-1)/4)*q.weight;
    maxTotal+=q.weight;
  });
  return Math.round(total/maxTotal*100);
}

function getGrade(score){
  if(score>=80)return 5;
  if(score>=65)return 4;
  if(score>=45)return 3;
  if(score>=25)return 2;
  return 1;
}

function getFinalResult(aG,bG){
  const diff=bG-aG;
  if(diff>=2)return{grade:aG,type:'down'};
  if(diff<=-2)return{grade:bG,type:'up'};
  return{grade:Math.round((aG+bG)/2),type:'match'};
}

function renderSurvey(app){
  const sec=sections[state.sectionIdx];
  const q=sec.questions[state.qIdx];
  const totalQ=18;
  const aLen=sectionA.questions.length;
  const doneQ=state.sectionIdx===0 ? state.qIdx : aLen+state.qIdx;
  const progress=Math.round(doneQ/totalQ*100);
  const ans=state.answers[sec.key][state.qIdx];
  const qPerSec=sec.questions.length;
  app.innerHTML=`
    <div class="progress-section fade-up">
      <div class="progress-meta">
        <span class="progress-label">${sec.eyebrow}</span>
        <span class="progress-count">${doneQ+1} / ${totalQ}</span>

    </div>

      <div class="scale-grid">
        ${[1,2,3,4,5].map(i=>`
          <button class="scale-btn${ans===i?' selected':''}" onclick="selectAnswer(${i})">

        <button class="btn btn-outline" onclick="goBack()" ${doneQ===0?'disabled':''}>← 이전</button>

      </div>
    </div>`;

  const sec=sections[state.sectionIdx];
  state.answers[sec.key][state.qIdx]=val;
  document.querySelectorAll('.scale-btn').forEach((btn,i)=>{
    btn.classList.toggle('selected',i+1===val);
  });
  document.getElementById('btn-next').disabled=false;
}

function goNext(){
  const sec=sections[state.sectionIdx];
  if(state.answers[sec.key][state.qIdx]==null)return;
  if(state.qIdx<sec.questions.length-1){state.qIdx++;}
  else if(state.sectionIdx<sections.length-1){state.sectionIdx++;state.qIdx=0;}
  else{state.phase='result';}
  render();
}

function goBack(){
  if(state.qIdx>0){state.qIdx--;}
  else if(state.sectionIdx>0){state.sectionIdx--;state.qIdx=sections[state.sectionIdx].questions.length-1;}
  else{state.phase='intro';}
  render();
}

              안전자산: 채권·예금·단기채·현금·원금보장상품
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tactical-outer">
      <div class="block-label">전술적 자산배분 (Tactical Asset Allocation)</div>
      <div class="tactical-section">
        <div class="tactical-header">
          <span class="tactical-title">시장 상황 따라 단기 조정</span>
        </div>
        <div class="tactical-body">
        ${tRisky>0 ? `
        <div class="tactical-row">
          <div class="tactical-label" style="color:${riskyColor};font-size:12px;font-weight:500">위험자산</div>
          <div class="tactical-bar-wrap">
            <div class="tactical-center-line"></div>
            <div class="tactical-base-mark"></div>
            <div class="tactical-range-bar tactical-plus-bar" style="width:${tacRiskyPct}%"></div>
            <div class="tactical-range-bar tactical-minus-bar" style="width:${tacRiskyDownPct}%"></div>
          </div>
          <div class="tactical-nums" style="color:${riskyColor}">−${tRiskyDown}% / +${tRisky}%</div>
        </div>
        <div class="tactical-row" style="margin-bottom:.5rem">
          <div class="tactical-label" style="color:${safeColor};font-size:12px;font-weight:500">안전자산</div>
          <div class="tactical-bar-wrap">
            <div class="tactical-center-line"></div>
            <div class="tactical-base-mark"></div>
            <div class="tactical-range-bar tactical-plus-bar" style="width:${tacRiskyDownPct}%;background:${safeColor};opacity:.45"></div>
            <div class="tactical-range-bar tactical-minus-bar" style="width:${tacSafePct}%;background:${safeColor};opacity:.35"></div>
          </div>
          <div class="tactical-nums" style="color:${safeColor}">−${tSafe}% / +${tRiskyDown}%</div>
        </div>` : `<div style="font-size:13px;color:var(--ink-3);padding:.25rem 0">전술적 조정 없음 — 현재 단계에서는 목표 비중 유지</div>`}
        <div style="margin-top:.85rem;padding-top:.65rem;border-top:1px solid var(--paper-3)">
          <div style="font-size:12px;color:var(--ink-2);line-height:1.65">${p.tacticalNote}</div>
        </div>
        ${tRisky>0?`<div class="tactical-legend">
          <div class="t-leg-item"><div class="t-leg-dot" style="background:${riskyColor};opacity:.55"></div>확대 가능 구간 (+)</div>
          <div class="t-leg-item"><div class="t-leg-dot" style="background:${riskyColor};opacity:.35"></div>축소 가능 구간 (−)</div>
          <div class="t-leg-item"><div class="t-leg-dot" style="background:var(--ink-4)"></div>전략적 기준선</div>
        </div>`:''}
        </div>
      </div><!-- /tactical-section -->
    </div><!-- /tactical-outer -->
    </div><!-- /alloc-tactical-wrap -->

    <div class="fade-up-3" id="returns-section" style="margin-bottom:2rem">
      <div class="block-label">장기 기대수익률 범위</div>
      <div id="returns-box" style="background:var(--paper-2);border:1px solid var(--paper-3);border-radius:var(--radius-lg);padding:1.1rem 1.25rem">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
          <div>
            <div style="font-family:'DM Serif Display',serif;font-size:32px;color:var(--ink);line-height:1">
              <span style="color:${gc.val}">${p.returns.low}</span>
              <span style="font-size:18px;color:var(--ink-3);margin:0 4px">~</span>
              <span style="color:${gc.val}">${p.returns.high}</span>
              <span style="font-size:16px;color:var(--ink-3);margin-left:4px">%</span>
            </div>
            <div style="font-size:11px;color:var(--ink-4);margin-top:.3rem">연평균 장기 기대수익률 (명목, 세전)</div>
          </div>
          <div style="background:${gc.bg};border:1px solid ${gc.border};border-radius:var(--radius);padding:.5rem .85rem;font-size:12px;color:${gc.text};line-height:1.5;max-width:200px">
            ${p.returns.note}
          </div>
        </div>
        <div style="margin-top:.85rem;padding-top:.75rem;border-top:1px solid var(--paper-3);font-size:11px;color:var(--ink-4);line-height:1.7">
          이 범위는 권장 포트폴리오의 장기(10년 이상) 연평균 기대수익률입니다. 단기 실제 수익률은 시장 상황에 따라 크게 달라질 수 있으며, 수익률이 높을수록 하락 구간의 폭도 커집니다. 과거 수익률이 미래를 보장하지 않습니다.
        </div>
      </div>
    </div>
    </div><!-- /print-page1 -->

    <div class="advisory fade-up-3">
      <div class="adv-label">전문가 조언</div>
      <div class="adv-text">${p.advice}</div>
    </div>

    <div class="fade-up-3">
      <div class="block-label">포트폴리오 체크리스트</div>
      <ul class="checklist">
        ${p.checks.map(c=>`<li><span class="check-icon"></span>${c}</li>`).join('')}
      </ul>
    </div>

    <hr class="section-div">

    <div class="re-section fade-up-3">
      <div class="block-label">한국 부동산 비중별 추가 안내</div>
      <div class="re-intro">
        <strong>통계청 2024 가계금융복지조사</strong> 기준, 한국 가계 자산의 평균 <strong>75%가 부동산</strong>에 집중되어 있습니다(65세 이상은 80~90%). 부동산 비중이 높을수록 A축(위험감수능력) 점수를 실질적으로 낮춰서 해석해야 합니다.
      </div>
      <div class="re-tabs">
        <button class="re-tab active" onclick="showRP('high',this)">
          <span class="re-tab-label">부동산 과다형</span>
          <span class="re-tab-range">80% 이상</span>
        </button>
        <button class="re-tab" onclick="showRP('mid',this)">
          <span class="re-tab-label">균형형</span>
          <span class="re-tab-range">50~79%</span>
        </button>
        <button class="re-tab" onclick="showRP('low',this)">
          <span class="re-tab-label">금융자산 중심형</span>
          <span class="re-tab-range">50% 미만</span>
        </button>
      </div>
      <div id="re-high" class="re-panel active">
        <div class="re-print-label" style="display:none">🏠 부동산 과다형 — 실물자산 비중 80% 이상</div>
        <div class="re-card">
          <div class="re-card-head" style="background:#fdf5e0"><div class="re-card-icon" style="background:#f0d99a;color:#7a4a00">🏠</div><div><div class="re-card-title">A축 점수 하향 조정 필요</div><div class="re-card-sub">부동산은 즉시 현금화 불가 — 실질 투자 능력 재평가</div></div></div>
          <div class="re-card-body"><p>총자산이 크더라도 현금화 가능한 금융자산이 부족하면, 위 분석의 A축 등급을 <strong>한 단계 낮게</strong> 재조정하세요. 은퇴기에는 자산의 크기보다 현금흐름이 핵심입니다.</p></div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#e1f5ee"><div class="re-card-icon" style="background:#9fe1cb;color:#0a4d38">📋</div><div><div class="re-card-title">주택연금 활용 검토</div><div class="re-card-sub">한국주택금융공사 | 국가 보증</div></div></div>
          <div class="re-card-body">
            <p>만 55세 이상, 공시가 12억원 이하 주택이라면 내 집에 살면서 평생 월 연금 수령 가능합니다.</p>
            <div class="re-highlight">예시: 70세·시세 3억원 → 월 약 92만원 / 7억원 → 월 약 215만원 (종신지급·정액형)</div>
            <a class="re-link" href="https://www.hf.go.kr/ko/sub03/sub03_02_02.do" target="_blank">한국주택금융공사 예상연금 조회 →</a>
          </div>
        </div>
        <div class="re-source">출처: 통계청 「2024 가계금융·복지조사」 / 한국주택금융공사 / 정책브리핑 「부동산 집중 가계자산 구조」(2024)</div>
      </div>
      <div id="re-mid" class="re-panel">
        <div class="re-card">
          <div class="re-card-head" style="background:#e1f5ee"><div class="re-card-icon" style="background:#9fe1cb;color:#0a4d38">⚖️</div><div><div class="re-card-title">Core-Satellite 전략</div><div class="re-card-sub">인컴 60% + 성장 40%</div></div></div>
          <div class="re-card-body">
            <p><strong>핵심(60%):</strong> 고배당 ETF·월지급식 채권으로 생활비 보조</p>
            <p><strong>위성(40%):</strong> 글로벌 지수 ETF·리츠로 인플레이션 방어</p>
            <div class="re-highlight">금융자산 수익으로 보유세·관리비 충당 구조를 먼저 만드세요.</div>
          </div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#faeeda"><div class="re-card-icon" style="background:#fac775;color:#633806">💰</div><div><div class="re-card-title">절세계좌 3대장</div><div class="re-card-sub">ISA · 연금저축 · IRP</div></div></div>
          <div class="re-card-body">
            <p><strong>ISA:</strong> 연 2,000만원, 수익 200만원 비과세 + 초과분 9.9% 분리과세</p>
            <p><strong>연금저축+IRP:</strong> 연간 합산 최대 900만원 세액공제</p>
          </div>
        </div>
        <div class="re-source">출처: 통계청 「2024 가계금융·복지조사」 / 금융위원회 ISA 제도 / 기획재정부 연금계좌 세액공제 규정</div>
      </div>
      <div id="re-low" class="re-panel">
        <div class="re-print-label" style="display:none">📊 금융자산 중심형 — 실물자산 비중 50% 미만</div>
        <div class="re-card">
          <div class="re-card-head" style="background:#d4e2f5"><div class="re-card-icon" style="background:#b5d4f4;color:#0c447c">📈</div><div><div class="re-card-title">부동산 대체 투자 편입</div><div class="re-card-sub">리츠·인프라 펀드</div></div></div>
          <div class="re-card-body">
            <p>직접 부동산 없이 리츠(REITs)·인프라 펀드로 임대 수익과 자산 상승의 과실을 누릴 수 있습니다.</p>
            <div class="re-highlight">권장: 위험자산 60% : 안전자산 40% 구조에서 리츠 15% 이내 포함</div>
          </div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#f2efe9"><div class="re-card-icon" style="background:#d3d1c7;color:#3d3a35">🛡️</div><div><div class="re-card-title">인플레이션·환율 헤지</div><div class="re-card-sub">실질 구매력 보호</div></div></div>
          <div class="re-card-body"><p>금(Gold) ETF 또는 달러 자산을 전체의 10~15%로 보유하세요. 부동산 미보유자는 주거비 상승 리스크에 특히 취약합니다.</p></div>
        </div>
        <div class="re-source">출처: 한국경제인협회·서울시립대 「주요국 가계 자산 구성 비교」(2024) / 통계청 「2024 가계금융·복지조사」</div>
      </div>
    </div>

    <div class="result-footer fade-up-3">
      본 분석은 Kitces(2012) 2차원 위험 분리 모델 및 금융투자협회 표준투자권유준칙을 참고하여 설계되었습니다.<br>
      재무 상담의 참고 자료이며, 구체적인 투자 결정은 반드시 전문 재무설계사와 상담하시기 바랍니다.
    </div>
    <div class="print-hide" style="display:flex;gap:8px;margin-top:.75rem">
      <button class="btn btn-ghost" style="flex:1" onclick="restart()">↺ 다시 시작하기</button>
      <button class="btn btn-primary" style="flex:1" onclick="window.print()">🖨 인쇄 / 저장</button>
    </div>
      </div><!-- /panel-result -->
    </div><!-- /result-tab-wrap -->
  `;
}

function switchTab(tab){
  document.querySelectorAll('.result-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.result-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

function showRP(id,btn){
  document.querySelectorAll('.re-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.re-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('re-'+id).classList.add('active');
  btn.classList.add('active');
}

function restart(){
  state={phase:'intro',sectionIdx:0,qIdx:0,answers:{A:[],B:[]}};
  render();
}

render();
</script>
</body>
</html>
