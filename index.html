<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자성향 분석 | Investment Profile Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814;
  --ink-2: #3d3a35;
  --ink-3: #7a776f;
  --ink-4: #b5b2a9;
  --paper: #faf8f4;
  --paper-2: #f2efe9;
  --paper-3: #e8e4db;
  --gold: #c4933f;
  --gold-light: #f0d99a;
  --gold-pale: #fdf5e0;
  --teal: #2a7c6f;
  --teal-light: #c8e8e2;
  --blue: #2b5ea7;
  --blue-light: #d4e2f5;
  --amber: #b86e1a;
  --red: #943030;
  --red-light: #fae8e8;
  --amber-light: #fdecd4;
  --radius: 2px;
  --radius-lg: 4px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── Layout ─── */
.page {
  max-width: 720px;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
}

/* ─── Header ─── */
.site-header {
  border-bottom: 1px solid var(--paper-3);
  padding-bottom: 2rem;
  margin-bottom: 3rem;
  display: flex;
  align-items: baseline;
  gap: 1rem;
  justify-content: space-between;
}
.site-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: .02em;
}
.site-logo span {
  color: var(--gold);
  font-style: italic;
}
.site-sub {
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* ─── Progress ─── */
.progress-section {
  margin-bottom: 2.5rem;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: .6rem;
}
.progress-label {
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.progress-count {
  font-size: 13px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.progress-track {
  height: 2px;
  background: var(--paper-3);
  border-radius: 1px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 1px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* ─── Section header ─── */
.section-eyebrow {
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .4rem;
  font-weight: 500;
}
.section-heading {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: .5rem;
  line-height: 1.4;
}
.section-desc {
  font-size: 13px;
  color: var(--ink-3);
  line-height: 1.7;
  margin-bottom: 2rem;
  padding-left: .75rem;
  border-left: 2px solid var(--paper-3);
}

/* ─── Question ─── */
.q-number {
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: .1em;
  margin-bottom: .5rem;
}
.q-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.55;
  margin-bottom: 1.5rem;
}

.scale-legend {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--ink-4);
  letter-spacing: .06em;
  margin-bottom: .5rem;
  text-transform: uppercase;
}

.scale-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 2rem;
}

.scale-btn {
  background: var(--paper);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius);
  padding: .75rem .4rem .6rem;
  cursor: pointer;
  text-align: center;
  transition: all .18s ease;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.scale-btn:hover {
  border-color: var(--gold);
  background: var(--gold-pale);
}
.scale-btn.selected {
  background: var(--ink);
  border-color: var(--ink);
}
.scale-btn .num {
  font-size: 18px;
  font-family: 'DM Serif Display', serif;
  color: var(--ink-3);
  line-height: 1;
  transition: color .18s;
}
.scale-btn.selected .num { color: var(--gold); }
.scale-btn .hint {
  font-size: 10px;
  color: var(--ink-4);
  line-height: 1.35;
  transition: color .18s;
  word-break: keep-all;
}
.scale-btn.selected .hint { color: rgba(255,255,255,.6); }

/* ─── Navigation ─── */
.nav-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.btn {
  padding: .65rem 1.5rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 400;
  transition: all .18s;
  letter-spacing: .02em;
}
.btn-outline {
  background: transparent;
  border: 1px solid var(--paper-3);
  color: var(--ink-3);
}
.btn-outline:hover { border-color: var(--ink-3); color: var(--ink); }
.btn-outline:disabled { opacity: .3; cursor: not-allowed; }
.btn-primary {
  background: var(--ink);
  border: 1px solid var(--ink);
  color: var(--gold-light);
  flex: 1;
  text-align: center;
}
.btn-primary:hover { background: var(--ink-2); }
.btn-primary:disabled { opacity: .3; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--paper-3);
  color: var(--ink-3);
  width: 100%;
  padding: .7rem;
  text-align: center;
  margin-top: .75rem;
}
.btn-ghost:hover { border-color: var(--ink-3); color: var(--ink); }

/* ─── Result ─── */
.result-top {
  border-bottom: 1px solid var(--paper-3);
  padding-bottom: 2rem;
  margin-bottom: 2rem;
}
.result-type-label {
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .5rem;
}
.result-name {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: .75rem;
}
.result-key-badge {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: var(--ink);
  color: var(--gold-light);
  font-size: 11px;
  letter-spacing: .1em;
  padding: .3rem .8rem;
  border-radius: 1px;
  margin-bottom: 1rem;
}
.result-desc {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  color: var(--ink-2);
  line-height: 1.75;
}

/* ─── Score cards ─── */
.score-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 2rem;
}
.score-card {
  background: var(--paper-2);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius);
  padding: 1rem;
  text-align: center;
}
.sc-label {
  font-size: 10px;
  color: var(--ink-4);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: .3rem;
}
.sc-value {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  line-height: 1;
  margin-bottom: .2rem;
}
.sc-sub {
  font-size: 10px;
  color: var(--ink-4);
}

/* ─── Section divider ─── */
.section-div {
  border: none;
  border-top: 1px solid var(--paper-3);
  margin: 1.75rem 0;
}

/* ─── Matrix ─── */
.matrix-section {
  margin-bottom: 2rem;
}
.block-label {
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: .9rem;
}
.matrix-axes {
  font-size: 10px;
  color: var(--ink-4);
  margin-bottom: .5rem;
}

.matrix-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.matrix-table th {
  font-size: 10px;
  font-weight: 400;
  color: var(--ink-4);
  letter-spacing: .05em;
  padding: .3rem .4rem .5rem;
  text-align: center;
  border-bottom: 1px solid var(--paper-3);
}
.matrix-table .row-header {
  font-size: 10px;
  color: var(--ink-4);
  white-space: nowrap;
  padding-right: .6rem;
  text-align: right;
  vertical-align: middle;
  font-weight: 400;
  letter-spacing: .04em;
}
.m-cell {
  padding: .5rem .3rem;
  text-align: center;
  border: 1px solid var(--paper-3);
  cursor: default;
  transition: all .15s;
  vertical-align: middle;
}
.m-cell .ck { font-size: 10px; font-weight: 500; margin-bottom: 1px; }
.m-cell .cn { font-size: 9px; line-height: 1.3; color: var(--ink-3); }
.m-cell.active-cell {
  background: var(--ink) !important;
  border-color: var(--ink) !important;
  outline: 2px solid var(--gold);
  outline-offset: 1px;
}
.m-cell.active-cell .ck { color: var(--gold); }
.m-cell.active-cell .cn { color: rgba(255,255,255,.65); }

/* ─── Allocation bars ─── */
.alloc-section { margin-bottom: 2rem; }
.alloc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: .55rem;
}
.alloc-name {
  font-size: 12px;
  color: var(--ink-2);
  width: 80px;
  flex-shrink: 0;
}
.alloc-track {
  flex: 1;
  height: 8px;
  background: var(--paper-3);
  border-radius: 1px;
  overflow: hidden;
}
.alloc-fill {
  height: 8px;
  border-radius: 1px;
  transition: width .8s cubic-bezier(.4,0,.2,1);
}
.alloc-pct {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  width: 34px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ─── Advisory ─── */
.advisory {
  background: var(--gold-pale);
  border: 1px solid var(--gold-light);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 1rem 1.15rem;
  margin-bottom: 1.5rem;
}
.advisory-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: .4rem;
}
.advisory-text {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.7;
}

.gap-warning {
  background: var(--red-light);
  border: 1px solid #f5c5c5;
  border-left: 3px solid var(--red);
  border-radius: var(--radius);
  padding: 1rem 1.15rem;
  margin-bottom: 1.5rem;
}
.gap-warning .advisory-label { color: var(--red); }
.gap-warning .advisory-text { color: #5a1f1f; }

/* ─── Checklist ─── */
.checklist {
  list-style: none;
  margin-bottom: 2rem;
}
.checklist li {
  display: flex;
  align-items: flex-start;
  gap: .7rem;
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.65;
  padding: .55rem 0;
  border-bottom: 1px solid var(--paper-3);
}
.checklist li:last-child { border-bottom: none; }
.check-icon {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--teal);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.check-icon::after {
  content: '';
  width: 6px;
  height: 4px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

/* ─── Footer ─── */
.result-footer {
  border-top: 1px solid var(--paper-3);
  padding-top: 1.5rem;
  margin-top: 2rem;
  font-size: 11px;
  color: var(--ink-4);
  line-height: 1.7;
  text-align: center;
}

/* ─── Animations ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp .45s cubic-bezier(.4,0,.2,1) both; }
.fade-up-2 { animation: fadeUp .45s cubic-bezier(.4,0,.2,1) .1s both; }
.fade-up-3 { animation: fadeUp .45s cubic-bezier(.4,0,.2,1) .2s both; }

/* ─── Real estate section ─── */
.re-section {
  margin-bottom: 2rem;
}
.re-intro {
  font-size: 13px;
  color: var(--ink-3);
  line-height: 1.7;
  margin-bottom: 1rem;
  padding: .75rem 1rem;
  background: var(--paper-2);
  border-radius: var(--radius);
  border: 1px solid var(--paper-3);
}
.re-intro strong { color: var(--ink-2); font-weight: 500; }
.re-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 1rem;
}
.re-tab {
  flex: 1;
  padding: .5rem .4rem;
  border: 1px solid var(--paper-3);
  border-radius: var(--radius);
  background: var(--paper);
  cursor: pointer;
  text-align: center;
  font-size: 11px;
  color: var(--ink-3);
  transition: all .18s;
  line-height: 1.35;
}
.re-tab:hover { border-color: var(--gold); color: var(--ink); }
.re-tab.active { background: var(--ink); border-color: var(--ink); color: var(--gold-light); }
.re-tab .re-tab-label { display: block; font-weight: 500; margin-bottom: 1px; }
.re-tab .re-tab-range { display: block; font-size: 10px; opacity: .75; }
.re-panel { display: none; }
.re-panel.active { display: block; }
.re-card {
  border: 1px solid var(--paper-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: .75rem;
}
.re-card-head {
  padding: .75rem 1rem;
  display: flex;
  align-items: center;
  gap: .6rem;
}
.re-card-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.re-card-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.re-card-sub { font-size: 11px; color: var(--ink-3); }
.re-card-body { padding: .75rem 1rem; border-top: 1px solid var(--paper-3); }
.re-card-body p {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.65;
  margin-bottom: .5rem;
}
.re-card-body p:last-child { margin-bottom: 0; }
.re-card-body .re-highlight {
  background: var(--gold-pale);
  border-left: 2px solid var(--gold);
  padding: .5rem .75rem;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 12px;
  color: var(--amber);
  margin-top: .5rem;
  line-height: 1.55;
}
.re-card-body .re-link {
  display: inline-block;
  margin-top: .4rem;
  font-size: 11px;
  color: var(--blue);
  text-decoration: none;
  border-bottom: 1px solid transparent;
}
.re-card-body .re-link:hover { border-color: var(--blue); }
.re-source {
  font-size: 10px;
  color: var(--ink-4);
  margin-top: 1rem;
  padding-top: .75rem;
  border-top: 1px solid var(--paper-3);
  line-height: 1.6;
}
.re-source a { color: var(--ink-4); text-decoration: underline; }

/* ─── Responsive ─── */
@media (max-width: 480px) {
  .page { padding: 1.5rem 1.2rem 4rem; }
  .scale-btn .hint { display: none; }
  .result-name { font-size: 28px; }
  .score-row { grid-template-columns: 1fr 1fr 1fr; }
  .sc-value { font-size: 26px; }
}
</style>
</head>
<body>
<div class="page">
  <header class="site-header">
    <div>
      <div class="site-logo">Investment <span>Profile</span></div>
      <div class="site-sub">투자성향 분석 도구</div>
    </div>
  </header>
  <div id="app"></div>
</div>

<script>
const sections = [
  {
    key:'A',
    eyebrow:'A축 · 01 / 02',
    heading:'위험감수능력 (Risk Capacity)',
    desc:'객관적인 가계 재무 상태를 측정합니다. 소득, 지출, 자산 구조를 바탕으로 실제 손실을 견딜 수 있는 능력을 평가합니다.',
    questions:[
      {text:'투자 가능한 기간은 얼마나 되나요?',hints:['1년 미만','1~3년','3~5년','5~10년','10년 이상']},
      {text:'향후 5년 내 큰 지출 계획(주택 구입, 자녀 교육, 사업 등)이 있나요?',hints:['소득 전액 이상','소득의 50~100%','소득의 20~50%','소득의 20% 미만','거의 없음']},
      {text:'전체 자산 중 순자산(자산–부채)의 비중은 어느 정도인가요?',hints:['20% 미만','20~40%','40~60%','60~80%','80% 이상']},
      {text:'현재 소득의 안정성은 어느 수준인가요?',hints:['매우 불안정(일용직)','불안정(프리랜서)','보통(직장인)','안정(중견기업 이상)','매우 안정(공무원/전문직)']},
      {text:'월 소득 중 저축 가능한 금액의 비중은?',hints:['5% 미만','5~10%','10~20%','20~30%','30% 이상']},
      {text:'비상금은 월 생활비 기준으로 몇 개월분 확보되어 있나요?',hints:['1개월 미만','1~2개월','3~5개월','6~11개월','1년 이상']},
      {text:'개인/퇴직연금 등 노후 준비는 어느 수준인가요?',hints:['전혀 없음','가입만 한 상태','기초 준비','표준 준비','충분히 다각화됨']},
      {text:'근로소득 외 현금흐름(배당, 임대료, 이자 등)의 규모는?',hints:['없음','소액(소득 5% 미만)','소득의 10% 수준','소득의 30% 수준','자본소득이 근로소득에 육박']},
      {text:'현재 연령대는 어디에 해당하나요?',hints:['70대 이상','60대','50대','40대','20~30대']},
      {text:'부양해야 할 가족(배우자, 자녀, 부모)의 규모는?',hints:['3인 이상 전적 책임','2인 책임','1인 책임','일부 도움 수준','없음(본인만 책임)']},
    ]
  },
  {
    key:'B',
    eyebrow:'B축 · 02 / 02',
    heading:'위험수용성향 (Risk Tolerance)',
    desc:'주관적인 심리와 투자 성향을 측정합니다. 변동성과 손실을 심리적으로 어느 정도 감내할 수 있는지를 평가합니다.',
    questions:[

const matrixLabels = {
  cols:['낮음 (10–23)','중간 (24–36)','높음 (37–50)'],
  rows:['높음 (37–50)','중간 (24–36)','낮음 (10–23)']
};
const matrixCells = [['H-L','H-M','H-H'],['M-L','M-M','M-H'],['L-L','L-M','L-H']];
const cellBg = {'H-H':'#d4e2f5','H-M':'#c8e8e2','H-L':'#e2efd1','M-H':'#e4e0f8','M-M':'#eeece7','M-L':'#c8e8e2','L-H':'#fde8c4','L-M':'#fde8c4','L-L':'#eeece7'};

let state = {phase:'survey',sectionIdx:0,qIdx:0,answers:{A:[],B:[]}};

function getZone(s){return s>=37?'H':s>=24?'M':'L';}
function getProfileKey(a,b){return getZone(a)+'-'+getZone(b);}

function render(){
  const app = document.getElementById('app');
  if(state.phase==='survey') renderSurvey(app);
  else renderResult(app);
}

function renderSurvey(app){
  const sec = sections[state.sectionIdx];
  const q = sec.questions[state.qIdx];
  const totalQ = 20;
  const doneQ = state.sectionIdx*10 + state.qIdx;
  const progress = Math.round(doneQ/totalQ*100);
  const ans = state.answers[sec.key][state.qIdx];

  app.innerHTML = `
    <div class="progress-section fade-up">
      <div class="progress-meta">
        <span class="progress-label">${sec.eyebrow}</span>
        <span class="progress-count">${doneQ+1} / ${totalQ}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>

    <div class="fade-up-2">
      <div class="section-eyebrow">${sec.key}축 — ${sec.key==='A'?'위험감수능력':'위험수용성향'}</div>
      <div class="section-heading">${sec.heading}</div>
      <div class="section-desc">${sec.desc}</div>
    </div>

    <div class="fade-up-3">
      <div class="q-number">질문 ${state.qIdx+1} / 10</div>
      <div class="q-text">${q.text}</div>

      <div class="scale-legend"><span>← 보수적</span><span>공격적 →</span></div>
      <div class="scale-grid">
        ${[1,2,3,4,5].map(i=>`
          <button class="scale-btn${ans===i?' selected':''}" onclick="selectAnswer(${i})">
            <span class="num">${i}</span>
            <span class="hint">${q.hints[i-1]}</span>
          </button>
        `).join('')}
      </div>

      <div class="nav-row">
        <button class="btn btn-outline" onclick="goBack()" ${doneQ===0?'disabled':''}>← 이전</button>
        <button class="btn btn-primary" id="btn-next" onclick="goNext()" ${ans==null?'disabled':''}>
          ${doneQ===totalQ-1?'결과 보기':'다음 →'}
        </button>
      </div>
    </div>
  `;
}

function selectAnswer(val){
  const sec = sections[state.sectionIdx];
  state.answers[sec.key][state.qIdx] = val;
  document.querySelectorAll('.scale-btn').forEach((btn,i)=>{
    btn.classList.toggle('selected', i+1===val);
  });
  document.getElementById('btn-next').disabled = false;
}

function goNext(){
  const sec = sections[state.sectionIdx];
  if(state.answers[sec.key][state.qIdx]==null) return;
  if(state.qIdx < sec.questions.length-1){ state.qIdx++; }
  else if(state.sectionIdx < sections.length-1){ state.sectionIdx++; state.qIdx=0; }
  else { state.phase='result'; }
  render();
}

function goBack(){
  if(state.qIdx>0){ state.qIdx--; }
  else if(state.sectionIdx>0){ state.sectionIdx--; state.qIdx=sections[state.sectionIdx].questions.length-1; }
  render();
}

function renderResult(app){
  const aScore = state.answers.A.reduce((a,b)=>a+b,0);
  const bScore = state.answers.B.reduce((a,b)=>a+b,0);
  const total = aScore+bScore;
  const key = getProfileKey(aScore,bScore);
  const p = profiles[key];
  const az = getZone(aScore), bz = getZone(bScore);
  const gap = Math.abs(aScore-bScore);
  const hasGap = gap>=12 && az!==bz;

  const colIdx = {L:0,M:1,H:2};
  const rowIdx = {H:0,M:1,L:2};
  const activeRow = rowIdx[az], activeCol = colIdx[bz];

  const cellNames = {
    'H-H':'공격적\n선구자','H-M':'균형\n성장가','H-L':'안전\n자산가',
    'M-H':'성장\n지향가','M-M':'표준\n중산층','M-L':'신중한\n은퇴자',
    'L-H':'고위험\n노출형','L-M':'한계\n생존형','L-L':'절대\n방어형'
  };

  const matrixRows = matrixLabels.rows.map((rowLabel,ri)=>`
    <tr>
      <td class="row-header">${rowLabel}</td>
      ${matrixCells[ri].map((ck,ci)=>`
        <td class="m-cell${ri===activeRow&&ci===activeCol?' active-cell':''}" style="background:${ri===activeRow&&ci===activeCol?'':cellBg[ck]}">
          <div class="ck">${ck}</div>
          <div class="cn">${cellNames[ck].replace('\n','<br>')}</div>
        </td>
      `).join('')}
    </tr>
  `).join('');

  app.innerHTML = `
    <div class="result-top fade-up">
      <div class="result-type-label">투자성향 분석 결과</div>
      <div class="result-name">${p.name}</div>
      <div class="result-key-badge">${key} 유형</div>
      <div class="result-desc">${p.desc}</div>
    </div>

    <div class="score-row fade-up-2">
      <div class="score-card">
        <div class="sc-label">위험감수능력 (A)</div>
        <div class="sc-value" style="color:#2b5ea7">${aScore}</div>
        <div class="sc-sub">/ 50점</div>
      </div>
      <div class="score-card">
        <div class="sc-label">위험수용성향 (B)</div>
        <div class="sc-value" style="color:#533AB7">${bScore}</div>
        <div class="sc-sub">/ 50점</div>
      </div>
      <div class="score-card">
        <div class="sc-label">종합 점수</div>
        <div class="sc-value">${total}</div>
        <div class="sc-sub">/ 100점</div>
      </div>
    </div>

    ${hasGap?`
    <div class="gap-warning fade-up-2">
      <div class="advisory-label">⚠ A·B축 괴리 감지 — ${gap}점 차이</div>
      <div class="advisory-text">${aScore<bScore
        ?'재무 기반에 비해 심리가 과도하게 공격적입니다. 마음은 용맹하시나, 가계 경제의 방패는 아직 얇습니다. 비상금 확보와 부채 상환을 먼저 진행하고 투자를 확대하세요.'
        :'재무 기반은 탄탄하나 심리적으로 지나치게 보수적입니다. 능력에 비해 과도한 안전 선호로 실질 수익률 기회를 놓치고 있을 수 있습니다. 투자 교육을 통해 성향을 점차 넓혀가는 것을 권장합니다.'
      }</div>
    </div>`:''}

    <hr class="section-div">

    <div class="matrix-section fade-up-3">
      <div class="block-label">3 × 3 투자성향 매트릭스</div>
      <div class="matrix-axes">↑ A축(위험감수능력) · → B축(위험수용성향)</div>
      <table class="matrix-table">
        <thead>
          <tr>
            <th></th>
            ${matrixLabels.cols.map(c=>`<th>${c}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${matrixRows}</tbody>
      </table>
    </div>

    <hr class="section-div">

    <div class="alloc-section fade-up-3">
      <div class="block-label">권장 자산 배분</div>
      ${p.alloc.map(([label,pct,color])=>`
        <div class="alloc-row">
          <div class="alloc-name">${label}</div>
          <div class="alloc-track"><div class="alloc-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="alloc-pct">${pct}%</div>
        </div>
      `).join('')}
    </div>

    <div class="advisory fade-up-3">
      <div class="advisory-label">전문가 조언</div>
      <div class="advisory-text">${p.advice}</div>
    </div>

    <div class="fade-up-3">

      <ul class="checklist">
        ${p.checks.map(c=>`<li><span class="check-icon"></span>${c}</li>`).join('')}

    </div>

    <hr class="section-div">

    <div class="re-section fade-up-3">
      <div class="block-label">한국 부동산 비중별 추가 안내</div>
      <div class="re-intro">
        <strong>통계청 2024년 가계금융복지조사</strong>에 따르면, 한국 가계 자산의 평균 <strong>75%가 부동산</strong>에 집중되어 있습니다(65세 이상 고령 가구는 80~90%). 미국(약 28%)·일본(약 37%)과 비교해 두 배 이상 높은 수준으로, 부동산 비중이 투자 전략과 노후 현금흐름에 결정적 영향을 미칩니다. 본인의 부동산 비중을 선택해 맞춤 안내를 확인하세요.
      </div>
      <div class="re-tabs">
        <button class="re-tab active" onclick="showRePanel('high',this)">

        </button>
        <button class="re-tab" onclick="showRePanel('mid',this)">

        </button>

      <div id="re-high" class="re-panel active">
        <div class="re-card">
          <div class="re-card-head" style="background:#fdf5e0">
            <div class="re-card-icon" style="background:#f0d99a;color:#7a4a00">🏠</div>
            <div><div class="re-card-title">현황 진단</div><div class="re-card-sub">자산의 80% 이상이 부동산 — 현금흐름 부족 위험</div></div>
          </div>
          <div class="re-card-body">
            <p>총자산은 크더라도 현금화 가능한 금융자산이 부족하면, 월 생활비·의료비 등 실제 소비에서 고갈 위기가 발생할 수 있습니다. 65세 이상 고령 가구의 경우 자산의 80~90%가 부동산에 쏠려 있어 이 문제가 더욱 심각합니다.</p>
          </div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#e1f5ee">
            <div class="re-card-icon" style="background:#9fe1cb;color:#0a4d38">📋</div>
            <div><div class="re-card-title">주택연금 활용 검토</div><div class="re-card-sub">한국주택금융공사 | 국가 보증 제도</div></div>
          </div>
          <div class="re-card-body">
            <p>주택을 담보로 내 집에 계속 살면서 평생 매월 연금을 받는 제도입니다. 부부 중 1인이 만 55세 이상이고 공시가격 12억원 이하 주택을 소유하면 가입 가능합니다.</p>
            <div class="re-highlight">예시: 70세 기준, 시세 3억원 주택 → 월 약 92만원 수령 / 시세 7억원 주택 → 월 약 215만원 수령 (종신지급·정액형, 한국주택금융공사 기준)</div>
            <a class="re-link" href="https://www.hf.go.kr/ko/sub03/sub03_02_02.do" target="_blank">한국주택금융공사 예상연금 조회 바로가기 →</a>
          </div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#f2efe9">
            <div class="re-card-icon" style="background:#d3d1c7;color:#3d3a35">🔄</div>
            <div><div class="re-card-title">다운사이징 전략</div><div class="re-card-sub">부동산 비중 축소 + 금융자산 전환</div></div>
          </div>
          <div class="re-card-body">
            <p>큰 주택을 작은 주택으로 옮기고 남은 차액을 배당형·인컴형 금융자산으로 전환하면, 부동산 비중을 낮추면서 매월 현금흐름을 확보할 수 있습니다.</p>
            <p>목표: 은퇴 시점까지 부동산·금융자산 비중을 최소 <strong>7:3</strong> 수준으로 조정 (정책브리핑 권고 기준)</p>
          </div>
        </div>
        <div class="re-source">
          출처: 통계청 「2024 가계금융·복지조사」 / 한국주택금융공사 주택연금 안내(hf.go.kr) / 대한민국 정책브리핑 「부동산 집중 가계자산 구조, 이대로 괜찮을까?」(2024)
        </div>
      </div>

      <div id="re-mid" class="re-panel">
        <div class="re-card">
          <div class="re-card-head" style="background:#e1f5ee">
            <div class="re-card-icon" style="background:#9fe1cb;color:#0a4d38">⚖️</div>
            <div><div class="re-card-title">현황 진단</div><div class="re-card-sub">부동산·금융자산 균형 — 가장 안정적인 구조</div></div>
          </div>
          <div class="re-card-body">
            <p>거주 주택 외에 일정 수준의 금융자산을 보유한 이상적인 중산층 구조입니다. 현재 구조를 유지하면서 금융자산에서 발생하는 인컴으로 부동산 보유 비용(보유세, 관리비 등)을 충당하는 것이 핵심입니다.</p>

        </div>

          <div class="re-card-head" style="background:#d4e2f5">
            <div class="re-card-icon" style="background:#b5d4f4;color:#0c447c">📊</div>

          </div>
          <div class="re-card-body">
            <p><strong>핵심(Core) 60%:</strong> 고배당 ETF, 월지급식 채권 펀드 등 인컴형 자산으로 매월 생활비 보조</p>
            <p><strong>위성(Satellite) 40%:</strong> 글로벌 지수 ETF(S&P500, MSCI World)나 국내외 리츠(REITs)로 인플레이션 방어 및 자산 실질 가치 보존</p>
            <div class="re-highlight">부동산이 오를 때는 매도보다 보유를 유지하되, 금융자산 수익으로 보유세·관리비를 충당하는 구조를 만드세요.</div>
          </div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#faeeda">
            <div class="re-card-icon" style="background:#fac775;color:#633806">💰</div>
            <div><div class="re-card-title">절세계좌 3대장 최대 활용</div><div class="re-card-sub">ISA · 연금저축 · IRP</div></div>
          </div>
          <div class="re-card-body">
            <p><strong>ISA(개인종합자산관리계좌):</strong> 연 2,000만원 납입, 운용수익 200만원까지 비과세 + 초과분 9.9% 분리과세. 만기 자금을 연금계좌로 이체 시 이체 금액의 10%(최대 300만원) 추가 세액공제</p>
            <p><strong>연금저축 + IRP:</strong> 연간 합산 최대 900만원 세액공제 (연금저축 600만원 + IRP 300만원)</p>
          </div>
        </div>
        <div class="re-source">
          출처: 통계청 「2024 가계금융·복지조사」 / 금융위원회 「ISA 제도 도입방안」 / 기획재정부 연금계좌 세액공제 규정
        </div>
      </div>

      <div id="re-low" class="re-panel">
        <div class="re-card">
          <div class="re-card-head" style="background:#d4e2f5">
            <div class="re-card-icon" style="background:#b5d4f4;color:#0c447c">📈</div>
            <div><div class="re-card-title">현황 진단</div><div class="re-card-sub">금융자산 중심 — 유동성 우수, 인플레이션 주의</div></div>
          </div>
          <div class="re-card-body">
            <p>자산의 유동성이 매우 높아 운용 자유도가 큽니다. 다만 부동산을 보유하지 않는 경우 주거비 상승 리스크와 자산 가치의 인플레이션 침식에 주의해야 합니다. 한경협·서울시립대 연구(2024)에 따르면 한국 금융자산 내 현금·예금 편중(46.3%)도 실질 수익률 저하 요인입니다.</p>
          </div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#eeedfe">
            <div class="re-card-icon" style="background:#cecbf6;color:#3c3489">🏢</div>
            <div><div class="re-card-title">부동산 대체 투자 편입</div><div class="re-card-sub">직접 부동산 없이 부동산 수익성 확보</div></div>
          </div>
          <div class="re-card-body">
            <p>리츠(REITs) 또는 인프라 펀드를 포트폴리오에 편입하면, 직접 부동산을 보유하지 않고도 임대 수익 및 부동산 가치 상승의 과실을 함께 누릴 수 있습니다.</p>
            <div class="re-highlight">권장 비중: 주식 40% : 채권 40% : 리츠·원자재·대체 20% — 글로벌 자산배분으로 인플레이션 헤지</div>
          </div>
        </div>
        <div class="re-card">
          <div class="re-card-head" style="background:#f2efe9">
            <div class="re-card-icon" style="background:#d3d1c7;color:#3d3a35">🛡️</div>
            <div><div class="re-card-title">인플레이션·환율 헤지</div><div class="re-card-sub">실질 구매력 보호 전략</div></div>
          </div>
          <div class="re-card-body">
            <p>화폐 가치 하락에 대비해 금(Gold) ETF 또는 달러 자산을 전체 포트폴리오의 10~15% 비중으로 보유하는 것을 권장합니다.</p>
            <p>장기적으로는 부동산 매입 시점(금리, 가격 수준, LTV 규제)을 전략적으로 검토하여 과도한 레버리지 없이 진입하는 것이 중요합니다.</p>
          </div>
        </div>
        <div class="re-source">
          출처: 한국경제인협회·서울시립대 「주요국 가계 자산 구성 비교 및 정책과제」(2024) / 통계청 「2024 가계금융·복지조사」 / 한국경제 「韓, 가계 자산 80% 부동산 몰빵」(2024)
        </div>
      </div>
    </div>

    <div class="result-footer fade-up-3">
      본 분석 결과는 재무 상담의 참고 자료로 활용하시기 바랍니다.<br>
      구체적인 투자 결정은 반드시 전문 재무설계사와 상담하시기 바랍니다.
    </div>

    <button class="btn btn-ghost" onclick="restart()">↺ 다시 시작하기</button>
  `;
}

function showRePanel(id, btn){
  document.querySelectorAll('.re-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.re-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('re-'+id).classList.add('active');
  btn.classList.add('active');
}

function restart(){
  state={phase:'survey',sectionIdx:0,qIdx:0,answers:{A:[],B:[]}};
  render();
}

render();
</script>
